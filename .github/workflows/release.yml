name: release

# Triggered by pushing a version tag (done by scripts/release.sh). The tag's commit already
# carries the synced versions; this workflow VERIFIES that, then opens a DRAFT release with an
# auto-generated skeleton for you to flesh out and Publish.
on:
  push:
    tags:
      - 'v[0-9]*'   # version tags only — avoids vendor-x / v-old triggering a red verify

permissions:
  contents: write   # create the GitHub release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a half-done release

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for the changelog range (git describe)

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify every manifest matches the tag
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}   # via env, never interpolated into the script
        run: |
          set -euo pipefail
          shopt -s nullglob
          plugins=( */.claude-plugin/plugin.json )
          [[ ${#plugins[@]} -gt 0 ]] || { echo "::error::no */.claude-plugin/plugin.json matched — layout/glob broke"; exit 1; }
          rc=0
          for f in "${plugins[@]}"; do
            got=$(jq -r '.version' "$f")
            if [[ "$got" == "$VER" ]]; then echo "ok  $f = $got"
            else echo "::error file=$f::version '$got' != tag '$VER'"; rc=1; fi
          done
          mf=.claude-plugin/marketplace.json
          got=$(jq -r '.metadata.version' "$mf")
          if [[ "$got" == "$VER" ]]; then echo "ok  $mf = $got"
          else echo "::error file=$mf::metadata.version '$got' != tag '$VER'"; rc=1; fi
          [[ $rc -eq 0 ]] || { echo "::error::版本号与 tag 不一致——请用 scripts/release.sh 发版"; exit 1; }

      - name: Build draft notes
        shell: bash
        env:
          REF: ${{ github.ref_name }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          prev=$(git describe --tags --abbrev=0 "${REF}^" 2>/dev/null || true)
          if [[ -n "$prev" ]]; then range=( "${prev}..${REF}" ); else range=( "$REF" ); fi
          sec() { # <heading> <grep-ere>
            local body; body=$(git log --no-merges --pretty='- %s' "${range[@]}" 2>/dev/null | grep -E "$2" || true)
            # if-form (not `[[ ]] && printf`): an empty section must return 0, else `set -e` aborts the step
            if [[ -n "$body" ]]; then printf '### %s\n%s\n\n' "$1" "$body"; fi
          }
          {
            echo "## ${REF}"
            echo
            echo "<!-- 草稿：补技术叙事后再 Publish。提交按类型分组（范围 ${range[*]}）。 -->"
            echo
            sec "Features" '^- feat'
            sec "Fixes" '^- fix'
            sec "其他 (chore / docs / refactor / ci / build / perf)" '^- (chore|docs|refactor|ci|build|perf|style|test)'
            echo "---"
            echo "_自动草稿（.github/workflows/release.yml）；plugin / marketplace 版本统一到 ${VER}。_"
          } > notes.md
          echo "----- notes.md -----"; cat notes.md

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # one probe, branch on exit code (not on an empty string — a query blip must not read as "published")
          if draft=$(gh release view "$REF" --json isDraft -q .isDraft 2>/dev/null); then
            if [[ "$draft" == "true" ]]; then
              echo "draft $REF exists — refreshing notes"
              gh release edit "$REF" --draft --notes-file notes.md
            else
              echo "::notice::release $REF already published — leaving it untouched"
            fi
          else
            echo "creating draft release $REF"
            gh release create "$REF" --title "$REF" --draft --notes-file notes.md
          fi
