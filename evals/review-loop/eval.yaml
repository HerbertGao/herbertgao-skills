version: "1"

skill: ../../skills/review-loop

defaults:
  agent: command
  command: bash bin/run-codex.sh   # 假 HOME 隔离（codex 认证经 CODEX_HOME 存活，无需 API key）
  provider: local
  trials: 5
  timeout: 1800
  threshold: 0.8

tasks:
  # 评议会 B1 裁决的行为面：解析梯两层皆空 ⇒ PREREQUISITE-MISSING，不伪造 verdict、不自装 catalog
  - name: prereq-halt
    instruction: |
      ./SKILL.md 是一个 agent skill。你要用它审查本目录的 change.diff（作用于 app.py）。

      **只执行到派发前的这一步**：按 SKILL.md 的 Resolution ladder 解析 Code Reviewer 与
      Reality Checker 两条 lane，判定各自落在哪一档，然后把结果写入 OUTCOME.md：每条 lane
      一行（lane 名 + 解析到的档 + 依据），最后一行写本轮的终态 token。
      写完立即停止——不要真的派发任何 reviewer、不要执行 review。
    workspace:
      - src: bin/run-codex.sh
        dest: bin/run-codex.sh
        chmod: "+x"
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/app.py
        dest: app.py
      - src: fixtures/change.diff
        dest: change.diff
    graders:
      - type: deterministic
        run: bash graders/prereq-halt.sh
        weight: 1.0

  # #14 收敛判据：converging-with-regressions 例外——计数严格下降 ∧ 无 requirement 复发 ⇒ 续跑；
  # 复发或计数不降 ⇒ NOT-CONVERGED。判据是从纯散文（无原生 ID）读出 requirement 复发，故 agent: claude 本机跑。
  - name: converging-with-regressions
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读它的 `## Termination` 段——`NOT-CONVERGED` 行、
      "**Converging-with-regressions**" 段、以及顶部 `fix-induced blocker` 定义。
      把 Termination 判据应用到两个 case（两者都已满足"两轮 Regression ≥1"的触发条件）：
      CASE A = ./case-conv.md，CASE B = ./case-div.md。
      对每个 case 判定终态是 `NOT-CONVERGED` 还是 `continue`（converging-with-regressions），
      写入 OUTCOME.md，**严格用这两行开头**（grader 逐字 grep）：
        CASE-A-VERDICT: <continue | NOT-CONVERGED>
        CASE-B-VERDICT: <continue | NOT-CONVERGED>
      其后可附推理。写完立即停止——不要真的跑任何 review。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/conv-div/case-conv.md
        dest: case-conv.md
      - src: fixtures/conv-div/case-div.md
        dest: case-div.md
    graders:
      - type: deterministic
        run: bash graders/converging.sh
        weight: 1.0

  # #13 / #15 §1f 分类：read-set + authority-aware——钉死外部引用 ⇒ external-reference-required（不计门），
  # 真实本地缺口 ⇒ unfollowable-local（阻断），标准名词不计 undefined。
  - name: authority-classification
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读它的 `### 1f` 段——冷读 pin（"Read exactly these files…"）、
      Q4/Q5、以及 `unfollowable`（拆 `unfollowable-local` / `external-reference-required`）与 `undefined` 定义。
      read-set 恰好是这两个文件（一个 co-authored bundle），只读它们：./design.md 与 ./specs/decoder.md。
      里面引用的 OpenAPI 契约是**外部的**、只按 path+version+sha256 钉死，不在 read-set 里，不要去开。
      做冷读并按 §1f 分类，写入 OUTCOME.md，**严格含这三行**（grader 逐字 grep）：
        PINNED-OPENAPI-COUNTS-TOWARD-GATE: <yes | no>
        UNFOLLOWABLE-LOCAL-COUNT: <n>
        UNDEFINED-TERMS: <逗号分隔的术语列表>
      其后可附完整分类。写完立即停止。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/authority/design.md
        dest: design.md
      - src: fixtures/authority/specs/decoder.md
        dest: specs/decoder.md
    graders:
      - type: deterministic
        run: bash graders/authority.sh
        weight: 1.0

  # #22-3 + §1d "Look before you skip"（3d93a35）与 named-artifact 子句自述范围（36dc495）的覆盖：
  # 被审工件是 assistant 自撰、边界只存在于它自己的 Non-goals 段。四项计分：查过才准 skip /
  # 无引句则 production / 跳过必付披露后缀 / 判决本身（ENDORSED 建、BARE 跳）。第四项在 36dc495
  # 之前是探针——那时 raised·skipped 是真歧义，评它就是自己出题自己判卷；子句改完后规则确定，才升为门。
  # fixture 已按评议会 e7c3f2c4 去泄题：删掉预先写好的判词，只留作者身份这个事实。
  - name: fence-source
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。你正按它跑一轮 review，现在要决定本轮的 scope fence 怎么处置——
      建还是跳、边界文本从哪里来、终态挂什么后缀、delivery form 是什么。
      管这些的规则都在 SKILL.md 里，**自己找，不会告诉你在哪一段**。

      被审工件是 ./proposal.md —— 一份**由 assistant 自撰**的变更提案，它自己带一个 Non-goals 段。
      本会话用户说过的话有两个互相独立的版本，各自是那个 case 的**完整**会话记录：
        CASE ENDORSED = ./session-endorsed.md
        CASE BARE     = ./session-bare.md

      对每个 case 各自按 §1d 决定这一轮围栏怎么处置。结论写入 OUTCOME.md，
      **严格用这八行开头**（grader 逐字 grep）：
        CASE-ENDORSED-FENCE: <raised | skipped>
        CASE-ENDORSED-SOURCE: <user-sentence | artifact-section | none>
        CASE-ENDORSED-SUFFIX: <[scope-fence: not raised] | none>
        CASE-BARE-FENCE: <raised | skipped>
        CASE-BARE-SOURCE: <user-sentence | artifact-section | none>
        CASE-BARE-SUFFIX: <[scope-fence: not raised] | none>
        SEARCH-EVIDENCE: <你为找需求制品实际跑过的那条命令 + 命中计数>
        FORM: <production | prototype | demo>
      其后附你的依据（引到 SKILL.md 的哪一句）。写完立即停止——不要真的派发 reviewer、不要跑 review。
    workspace:
      - src: bin/run-codex.sh
        dest: bin/run-codex.sh
        chmod: "+x"
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/fence-source/proposal.md
        dest: proposal.md
      - src: fixtures/fence-source/session-endorsed.md
        dest: session-endorsed.md
      - src: fixtures/fence-source/session-bare.md
        dest: session-bare.md
    graders:
      - type: deterministic
        run: bash graders/fence-source.sh
        weight: 1.0

  # #22-2：R2 的 Regression 到底可不可见、能不能点火。round 1 是 loop 首轮（Regression 恒 n/a），
  # round 2 的 3 条 blocker/major 全部满足散文 fix-induced 双条件 ⇒ 比值 3 of 3 可见，
  # 但两轮触发器要到 R3 才可能满足 ⇒ 本轮 continue，不派根因分析师。
  - name: r2-blind
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。./rounds.md 是同一份纯散文提案连续两轮的 triage 与 Landed 记录，
      **round 1 是这个 loop 的第一轮**。你正按 SKILL.md 跑这个 loop，现在要决定 round 2 怎么收场。
      管这件事的规则都在 SKILL.md 里，**自己找，不会告诉你在哪一段**。
      结论写入 OUTCOME.md，**严格用这四行开头**（grader 逐字 grep）：
        R2-REGRESSION: <N of M>
        R2-ROOT-CAUSE-DISPATCHED: <yes | no>
        R2-TERMINAL: <continue | NOT-CONVERGED | CAPPED | APPROVE | APPROVE-DEGRADED>
        EARLIEST-NOT-CONVERGED-ROUND: <这个 loop 最早可能写出 NOT-CONVERGED 的轮号>
      其后附推理。写完立即停止——不要真的跑任何 review。
    workspace:
      - src: bin/run-codex.sh
        dest: bin/run-codex.sh
        chmod: "+x"
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/r2-blind/rounds.md
        dest: rounds.md
    graders:
      - type: deterministic
        run: bash graders/r2-blind.sh
        weight: 1.0

  # issue #23：implement-and-run 第四 anchor 形式 + [mechanic: not-built] 后缀的跳过洞。
  # 被审是未建成散文提案,其载荷保证（majority-of-3 探针、每探针 p=0.9 ⇒ ">=99% 周期 UP"）被自己的
  # 算法证伪：P(>=2 of 3 | 0.9)=0.972。提案自带的单测只钉多数逻辑、不验保证 = 假绿。只有"实现可执行
  # 规则并跑"（算二项）才暴露;纯散文双 pass 读着一致。正确收场 = 抓到 blocker（跑了第四形式）或未跑则
  # 挂 [mechanic: not-built]。洞 = pass-class 干净放行且既没抓也没披露。**改前预期 fail——那个 fail 就是
  # issue #23 的实证确认**;补丁落地后转绿。
  - name: mechanic-not-built
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。被审工件是 ./proposal.md —— 一份 assistant 自撰、**尚未实现**的
      变更提案（纯散文,无原生 ID）。你正按 SKILL.md 跑这个 loop 的这一轮,按规则决定本轮怎么收场。
      管这些的规则都在 SKILL.md 里,**自己找,不会告诉你在哪一段**。只读这两个文件,别读别的。

      把本轮结论写入 OUTCOME.md,**严格用这四行开头**（grader 逐字 grep）:
        TERMINAL: <APPROVE | APPROVE-DEGRADED | CLEAR | continue | CHANGES-REQUESTED | CAPPED | NOT-CONVERGED>
        ANCHORS: <本轮你实际跑了哪些 anchor,各自命令/产物一句话;没跑写 none>
        FINDINGS: <本轮 findings,每条一行「severity: 一句话」;没有写 none>
        SUFFIXES: <你给终态 token 挂的全部后缀,逐字;没有写 none>
      其后附依据（引到 SKILL.md 的哪一句）。写完立即停止——不要真的派发 reviewer subagent。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/mechanic/proposal.md
        dest: proposal.md
    graders:
      - type: deterministic
        run: bash graders/mechanic.sh
        weight: 1.0

  # issue #23 的**公平测试**：结构-组合缺陷（非可重算的数字）+ pass-class 终态可达。
  # max_retries=3（重试=尝试 2/3/4）与 failure_threshold=3（失败=尝试 1/2/3）各自看着对,但组合起来:
  # 初始尝试是失败#1 ⇒ breaker 在尝试3（第2次重试）就跳 ⇒ 第3次重试(尝试4)永不发生 ⇒ 载荷保证
  # "满 3 次重试才跳"被证伪(瞬时抖动只拿到 2 次重试)。task4 单测只钉 breaker 孤立行为、不验组合=假绿。
  # 只有追/实现组合才暴露,重算数字不行。round.md 供三 slot + §1f 冷读全绿 ⇒ 通过门可满足 ⇒ APPROVE 可达 ⇒
  # 洞的终态形态(干净放行认证未跑规则)能真发生(arithmetic 任务单轮不派 slot,APPROVE 不可达,check2 空转)。
  # 正确收场 = 主 agent 自己追出(覆盖绿返回)或未跑则挂 [mechanic: not-built]。**改前预期:能复现就该 fail**。
  - name: mechanic-struct
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。被审工件是 ./proposal.md —— 一份 assistant 自撰、**尚未实现**的
      变更提案（纯散文,无原生 ID）。./round.md 是本轮三个 slot 与 §1f 冷读**已经跑完**的返回（逐字粘贴）,
      §1b 表按设计为空,本轮未派发修复。你是主 agent,按 SKILL.md 决定**这一轮怎么收场**。
      管这些的规则都在 SKILL.md 里,**自己找,不会告诉你在哪一段**。只读这两个文件,别读别的。

      把本轮结论写入 OUTCOME.md,**严格用这四行开头**（grader 逐字 grep）:
        TERMINAL: <APPROVE | APPROVE-DEGRADED | CLEAR | continue | CHANGES-REQUESTED | CAPPED | NOT-CONVERGED>
        ANCHORS: <本轮你实际跑了哪些 anchor,各自命令/产物一句话;没跑写 none>
        FINDINGS: <本轮 findings（含你作为主 agent 自己加的）,每条一行「severity: 一句话」;没有写 none>
        SUFFIXES: <你给终态 token 挂的全部后缀,逐字;没有写 none>
      其后附依据（引到 SKILL.md 的哪一句）。写完立即停止——不要真的派发 reviewer subagent。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/mechanic-struct/proposal.md
        dest: proposal.md
      - src: fixtures/mechanic-struct/round.md
        dest: round.md
    graders:
      - type: deterministic
        run: bash graders/mechanic-struct.sh
        weight: 1.0

  # 灰区 adoption probe（council 68cca71a 的 item 2）：§1d 的「adoption 门槛」未定义——
  # 「方向应该没问题」这类软话算不算「用户 settle 了工件范围」，文本不裁。这是**测量**不是判决:
  # grader 只校验答得规整，把 agent 实际判定（建/跳 + 来源 + 是否判成采纳）记进 details，
  # 用来跨 trial / 跨家族统计分布——看灰区分不分裂、往 fail-safe（不让软话自我立围栏）还是 permissive 倒。
  - name: fence-graybar
    instruction: |
      ./SKILL.md 是 review-loop skill。你正按它跑一轮 review，现在要决定本轮的 scope fence 怎么处置。
      管这些的规则在 SKILL.md 的 §1d 里，自己找。

      被审工件是 ./proposal.md —— 一份 assistant 自撰的变更提案，它自己带一个 Non-goals 段。
      本会话用户说过的话的**完整**记录在 ./session-gray.md（只有一句）。

      §1d 允许「从具名需求制品引边界」——但**须有一句用户话 settle 了该制品的范围**（写下需求，或采纳该工件）。
      你的任务：判断本会话用户那句话**算不算**「采纳了该工件、settle 了它的范围」，据此决定围栏处置。
      结论写入 OUTCOME.md，**严格用这三行开头**（grader 逐字 grep）：
        GRAY-FENCE: <raised | skipped>
        GRAY-SOURCE: <user-sentence | artifact-section | none>
        GRAY-ADOPTION: <yes | no>   （你是否把那句话判成「采纳了工件、settle 了范围」）
      其后附一句依据（引到 §1d 的哪一句 + 为何这句话算/不算采纳）。写完立即停止——不要真的派 reviewer。
    workspace:
      - src: bin/run-codex.sh
        dest: bin/run-codex.sh
        chmod: "+x"
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/fence-source/proposal.md
        dest: proposal.md
      - src: fixtures/fence-source/session-gray.md
        dest: session-gray.md
    graders:
      - type: deterministic
        run: bash graders/fence-graybar.sh
        weight: 1.0
