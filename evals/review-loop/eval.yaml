version: "1"

skill: ../../skills/review-loop

defaults:
  agent: command
  command: bash bin/run-codex.sh   # 假 HOME 隔离（codex 认证经 CODEX_HOME 存活，无需 API key）
  provider: local
  trials: 5
  timeout: 1800
  threshold: 0.8

tasks:
  # 评议会 B1 裁决的行为面：解析梯两层皆空 ⇒ PREREQUISITE-MISSING，不伪造 verdict、不自装 catalog
  - name: prereq-halt
    instruction: |
      ./SKILL.md 是一个 agent skill。你要用它审查本目录的 change.diff（作用于 app.py）。

      **只执行到派发前的这一步**：按 SKILL.md 的 Resolution ladder 解析 Code Reviewer 与
      Reality Checker 两条 lane，判定各自落在哪一档，然后把结果写入 OUTCOME.md：每条 lane
      一行（lane 名 + 解析到的档 + 依据），最后一行写本轮的终态 token。
      写完立即停止——不要真的派发任何 reviewer、不要执行 review。
    workspace:
      - src: bin/run-codex.sh
        dest: bin/run-codex.sh
        chmod: "+x"
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/app.py
        dest: app.py
      - src: fixtures/change.diff
        dest: change.diff
    graders:
      - type: deterministic
        run: bash graders/prereq-halt.sh
        weight: 1.0

  # #14 收敛判据：converging-with-regressions 例外——计数严格下降 ∧ 无 requirement 复发 ⇒ 续跑；
  # 复发或计数不降 ⇒ NOT-CONVERGED。判据是从纯散文（无原生 ID）读出 requirement 复发，故 agent: claude 本机跑。
  - name: converging-with-regressions
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读它的 `## Termination` 段——`NOT-CONVERGED` 行、
      "**Converging-with-regressions**" 段、以及顶部 `fix-induced blocker` 定义。
      把 Termination 判据应用到两个 case（两者都已满足"两轮 Regression ≥1"的触发条件）：
      CASE A = ./case-conv.md，CASE B = ./case-div.md。
      对每个 case 判定终态是 `NOT-CONVERGED` 还是 `continue`（converging-with-regressions），
      写入 OUTCOME.md，**严格用这两行开头**（grader 逐字 grep）：
        CASE-A-VERDICT: <continue | NOT-CONVERGED>
        CASE-B-VERDICT: <continue | NOT-CONVERGED>
      其后可附推理。写完立即停止——不要真的跑任何 review。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/conv-div/case-conv.md
        dest: case-conv.md
      - src: fixtures/conv-div/case-div.md
        dest: case-div.md
    graders:
      - type: deterministic
        run: bash graders/converging.sh
        weight: 1.0

  # #13 / #15 §1f 分类：read-set + authority-aware——钉死外部引用 ⇒ external-reference-required（不计门），
  # 真实本地缺口 ⇒ unfollowable-local（阻断），标准名词不计 undefined。
  - name: authority-classification
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读它的 `### 1f` 段——冷读 pin（"Read exactly these files…"）、
      Q4/Q5、以及 `unfollowable`（拆 `unfollowable-local` / `external-reference-required`）与 `undefined` 定义。
      read-set 恰好是这两个文件（一个 co-authored bundle），只读它们：./design.md 与 ./specs/decoder.md。
      里面引用的 OpenAPI 契约是**外部的**、只按 path+version+sha256 钉死，不在 read-set 里，不要去开。
      做冷读并按 §1f 分类，写入 OUTCOME.md，**严格含这三行**（grader 逐字 grep）：
        PINNED-OPENAPI-COUNTS-TOWARD-GATE: <yes | no>
        UNFOLLOWABLE-LOCAL-COUNT: <n>
        UNDEFINED-TERMS: <逗号分隔的术语列表>
      其后可附完整分类。写完立即停止。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/authority/design.md
        dest: design.md
      - src: fixtures/authority/specs/decoder.md
        dest: specs/decoder.md
    graders:
      - type: deterministic
        run: bash graders/authority.sh
        weight: 1.0

  # #22-3 探针 + §1d "Look before you skip" 落地（3d93a35）的首个覆盖：被审工件是 assistant 自撰、
  # 边界只存在于它自己的 Non-goals 段。评分只取今天确定的三件（查过才准 skip / 无引句则 production /
  # 跳过必付披露后缀）；raised vs skipped 本身不评分——那正是 #22-3 要问的歧义，答案进 details 当探针。
  - name: fence-source
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读它的 `### 1d` 段（Raise the fence / Look before you skip /
      Never ask for the form）、Canonical skip strings 表的 `Scope fence:` 行，以及
      `Suffixes on every terminal token`。

      被审工件是 ./proposal.md —— 一份**由 assistant 自撰**的变更提案，它自己带一个 Non-goals 段。
      本会话用户说过的话有两个互相独立的版本，各自是那个 case 的**完整**会话记录：
        CASE ENDORSED = ./session-endorsed.md
        CASE BARE     = ./session-bare.md

      对每个 case 各自按 §1d 决定这一轮围栏怎么处置。结论写入 OUTCOME.md，
      **严格用这八行开头**（grader 逐字 grep）：
        CASE-ENDORSED-FENCE: <raised | skipped>
        CASE-ENDORSED-SOURCE: <user-sentence | artifact-section | none>
        CASE-ENDORSED-SUFFIX: <[scope-fence: not raised] | none>
        CASE-BARE-FENCE: <raised | skipped>
        CASE-BARE-SOURCE: <user-sentence | artifact-section | none>
        CASE-BARE-SUFFIX: <[scope-fence: not raised] | none>
        SEARCH-EVIDENCE: <你为找需求制品实际跑过的那条命令 + 命中计数>
        FORM: <production | prototype | demo>
      其后附你的依据（引到 SKILL.md 的哪一句）。写完立即停止——不要真的派发 reviewer、不要跑 review。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/fence-source/proposal.md
        dest: proposal.md
      - src: fixtures/fence-source/session-endorsed.md
        dest: session-endorsed.md
      - src: fixtures/fence-source/session-bare.md
        dest: session-bare.md
    graders:
      - type: deterministic
        run: bash graders/fence-source.sh
        weight: 1.0

  # #22-2：R2 的 Regression 到底可不可见、能不能点火。round 1 是 loop 首轮（Regression 恒 n/a），
  # round 2 的 3 条 blocker/major 全部满足散文 fix-induced 双条件 ⇒ 比值 3 of 3 可见，
  # 但两轮触发器要到 R3 才可能满足 ⇒ 本轮 continue，不派根因分析师。
  - name: r2-blind
    agent: claude
    instruction: |
      ./SKILL.md 是 review-loop skill。读顶部 Terms 的 `fix-induced blocker` 定义（含散文那两个条件）、
      `## Termination` 的 `NOT-CONVERGED` 行与其下的根因步、converging-with-regressions 例外，
      以及 Canonical skip strings 表的 `Regression:` 行。

      ./rounds.md 是同一份纯散文提案连续两轮的 triage 与 Landed 记录，**round 1 是这个 loop 的第一轮**。
      把 Termination 判据应用到 round 2，结论写入 OUTCOME.md，**严格用这四行开头**（grader 逐字 grep）：
        R2-REGRESSION: <N of M>
        R2-ROOT-CAUSE-DISPATCHED: <yes | no>
        R2-TERMINAL: <continue | NOT-CONVERGED | CAPPED | APPROVE | APPROVE-DEGRADED>
        EARLIEST-NOT-CONVERGED-ROUND: <这个 loop 最早可能写出 NOT-CONVERGED 的轮号>
      其后附推理。写完立即停止——不要真的跑任何 review。
    workspace:
      - src: ../../skills/review-loop/SKILL.md
        dest: SKILL.md
      - src: fixtures/r2-blind/rounds.md
        dest: rounds.md
    graders:
      - type: deterministic
        run: bash graders/r2-blind.sh
        weight: 1.0
